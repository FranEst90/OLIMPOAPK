name: Build APK

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Install Android build-tools
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "build-tools;34.0.0"

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename to OLIMPO.apk
        # La action de firma agrega "-signed" al nombre (OLIMPO.apk ->
        # OLIMPO-signed.apk); se renombra al nombre oficial exacto. Se
        # fija working-directory a la raíz del repo porque
        # signedReleaseFile viene resuelto por esa action relativo ahí,
        # no al defaults.run.working-directory (android/) del resto del job.
        working-directory: ${{ github.workspace }}
        run: mv "${{ steps.sign_apk.outputs.signedReleaseFile }}" android/app/build/outputs/apk/release/OLIMPO.apk

      - uses: actions/upload-artifact@v4
        with:
          name: OLIMPO.apk
          path: android/app/build/outputs/apk/release/OLIMPO.apk
